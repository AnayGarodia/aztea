services:
  api:
    build: .
    ports: ["8000:8000"]
    volumes: ["./data:/data"]
    environment:
      - API_KEY=${API_KEY}
      - DB_PATH=/data/registry.db
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
