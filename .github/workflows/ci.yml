name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Python lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements-dev.txt flake8

      - name: Run flake8
        run: flake8 .

  test:
    name: Python tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run pytest (unit + non-integration)
        # Mirror the documented test command (CLAUDE.md): the SDK contract
        # suite has been segfaulting on the GH runner under Python 3.11 and
        # is run separately. Integration tests boot a uvicorn lifespan
        # per-test and segfault on the GH runner when their teardown thread
        # races the next standalone test's DB init — so they run in their
        # own pytest invocation below.
        run: pytest -q tests/ --ignore=tests/test_sdk_contract.py --ignore=tests/integration
        env:
          API_KEY: test-master-key

      - name: Run pytest (integration)
        # Separate invocation: process boundary kills any leftover lifespan
        # threads before the next test starts, sidestepping the segfault.
        run: pytest -q tests/integration
        env:
          API_KEY: test-master-key


  frontend-build:
    name: Frontend build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      # `npm ci` (not `npm install`) is load-bearing for supply-chain hardening:
      # it installs exact versions from package-lock.json and EXITS NON-ZERO if
      # the lockfile drifted from package.json. Switching to `npm install` here
      # silently re-resolves caret-pinned deps to whatever is latest on the
      # registry — same shape as the ua-parser-js / node-ipc compromises. Keep
      # this as `npm ci` everywhere a frontend build runs (CI + the deploy
      # runbook at docs/runbooks/deploy.md:44).
      - name: Install (reproducible) and build
        run: cd frontend && npm ci && npm run build
