name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Python lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements-dev.txt flake8 pip-audit

      - name: Run flake8
        run: flake8 .

      # Catch supply-chain compromises BEFORE they ship. The 2026-05-26 audit
      # found that the prior security-hardening PR pinned `fastapi==0.136.3`
      # via pip-compile right around the time that version was published as
      # OSV MAL-2026-4750 — a malicious release that snuck an undocumented
      # `fastar` typosquat dep into the `[standard]` extra. CI must fail loudly
      # on every future MAL- / GHSA- listing against pinned versions so the
      # next compromise can't ride in on a routine dep refresh.
      #
      # --strict makes ANY known vuln fail the job (HIGH + CRITICAL + MEDIUM
      # + LOW + MAL); calibrate down to `--vulnerability-service osv` filters
      # if the noise floor becomes a problem.
      # CVE-2026-24049 — wheel<0.46.2 path traversal during wheel install.
      # We can't bump wheel to 0.46.2 because it requires packaging>=24.0
      # while checkov 3.2.x pins packaging<24.0. wheel is a build-time tool
      # of pip-tools only; it never reaches runtime, so the path-traversal
      # attack surface (untrusted .whl content) doesn't exist in our use.
      # Revisit when checkov 3.3 (or its packaging>=24 successor) lands.
      - name: pip-audit (supply-chain vulnerability scan)
        run: pip-audit --skip-editable --strict --ignore-vuln CVE-2026-24049

  test:
    name: Python tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run pytest (unit + non-integration)
        # Mirror the documented test command (CLAUDE.md): the SDK contract
        # suite has been segfaulting on the GH runner under Python 3.11 and
        # is run separately. Integration tests boot a uvicorn lifespan
        # per-test and segfault on the GH runner when their teardown thread
        # races the next standalone test's DB init — so they run in their
        # own pytest invocation below.
        #
        # -p no:randomly: pytest-randomly's order shuffle exposes a known
        # patch-context-leak from test_watchers_adversarial's _patch_http
        # into test_buyer_surface_smoke's requests.get path. The leak is
        # tracked separately; deterministic order keeps CI green while we
        # fix the underlying scope issue.
        #
        # --deselect entries mirror the documented Phase 1 gate deselects
        # (CLAUDE.md): six tests that flake on every CI runner with
        # private-IP-blocking guards interacting with hosted-runner DNS.
        run: |
          pytest -q tests/ --ignore=tests/test_sdk_contract.py --ignore=tests/integration -p no:randomly \
            --deselect "tests/test_security_regressions.py::test_registry_register_blocks_private_endpoint_urls" \
            --deselect "tests/test_security_regressions.py::test_registry_call_blocks_misconfigured_endpoint_without_charging" \
            --deselect "tests/test_watchers_adversarial.py::test_T1_4_http_redirect_to_private_ip_is_blocked" \
            --deselect "tests/test_agent_real_tool.py::test_browser_agent_request_guard_aborts_private_subrequests"
        env:
          API_KEY: test-master-key

      - name: Run pytest (integration)
        # Separate invocation: process boundary kills any leftover lifespan
        # threads before the next test starts, sidestepping the segfault.
        run: |
          pytest -q tests/integration -p no:randomly \
            --deselect "tests/integration/test_onboarding_registry.py::test_registry_register_auto_verifies_with_verifier_url" \
            --deselect "tests/integration/test_wallets_stripe_auth.py::test_outbound_url_validation_blocks_private_targets_by_default"
        env:
          API_KEY: test-master-key


  frontend-build:
    name: Frontend build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      # `npm ci` (not `npm install`) is load-bearing for supply-chain hardening:
      # it installs exact versions from package-lock.json and EXITS NON-ZERO if
      # the lockfile drifted from package.json. Switching to `npm install` here
      # silently re-resolves caret-pinned deps to whatever is latest on the
      # registry — same shape as the ua-parser-js / node-ipc compromises. Keep
      # this as `npm ci` everywhere a frontend build runs (CI + the deploy
      # runbook at docs/runbooks/deploy.md:44).
      - name: Install (reproducible) and build
        run: cd frontend && npm ci && npm run build
