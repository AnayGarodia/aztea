# LiteLLM gateway + its own Postgres for the Otto proxies.
#
# Runs PRIVATELY on the aztea VM: the gateway is published only on 127.0.0.1:4000, never on
# a public interface. aztea reaches it locally; the macOS app never talks to it directly.
#
# Bring up:    docker compose -f deploy/litellm/docker-compose.yml --env-file deploy/litellm/.env up -d
# Logs:        docker compose -f deploy/litellm/docker-compose.yml logs -f litellm
# Tear down:   docker compose -f deploy/litellm/docker-compose.yml down
#
# After first boot, mint the two virtual keys (see deploy/litellm/README.md) and put them
# in aztea's env as OTTO_RESPONSES_LITELLM_KEY / OTTO_REALTIME_LITELLM_KEY.
services:
  litellm-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: litellm
      POSTGRES_USER: litellm
      POSTGRES_PASSWORD: ${LITELLM_DB_PASSWORD:?set LITELLM_DB_PASSWORD in deploy/litellm/.env}
    volumes:
      - litellm-db-data:/var/lib/postgresql/data
    # Internal only — not published to any host port.
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U litellm -d litellm"]
      interval: 3s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  litellm:
    image: ghcr.io/berriai/litellm:main-stable
    depends_on:
      litellm-db:
        condition: service_healthy
    # Publish ONLY on loopback so the gateway is never reachable from outside the VM.
    # Host port 4001 (not 4000 — that's taken by the Elixir/BEAM service on this VM);
    # the container still listens on 4000 internally.
    ports:
      - "127.0.0.1:4001:4000"
    volumes:
      - ./config.yaml:/app/config.yaml:ro
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    environment:
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY:?set LITELLM_MASTER_KEY in deploy/litellm/.env}
      DATABASE_URL: postgresql://litellm:${LITELLM_DB_PASSWORD}@litellm-db:5432/litellm
      # Upstream provider creds consumed by config.yaml (os.environ/...).
      AZURE_RESPONSES_URL: ${AZURE_RESPONSES_URL}
      AZURE_RESPONSES_KEY: ${AZURE_RESPONSES_KEY}
      AZURE_REALTIME_URL: ${AZURE_REALTIME_URL}
      AZURE_REALTIME_KEY: ${AZURE_REALTIME_KEY}
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:4000/health/liveliness').status==200 else 1)\""]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    restart: unless-stopped

volumes:
  litellm-db-data:
