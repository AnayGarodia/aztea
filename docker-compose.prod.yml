services:
  api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - agentmarket_data:/data
    env_file:
      - .env
    environment:
      # ── Core ──────────────────────────────────────────────────────────────
      - ENVIRONMENT=production
      - DB_PATH=/data/registry.db
      - LOG_LEVEL=INFO
      - SERVER_BASE_URL=${SERVER_BASE_URL}
      - FRONTEND_BASE_URL=${FRONTEND_BASE_URL}
      - CORS_ALLOW_ORIGINS=${CORS_ALLOW_ORIGINS:-}
      - AZTEA_FRONTEND_URL=${AZTEA_FRONTEND_URL}
      - PLATFORM_FEE_PCT=${PLATFORM_FEE_PCT:-10}
      # ── Stripe payments ───────────────────────────────────────────────────
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
      - STRIPE_PUBLISHABLE_KEY=${STRIPE_PUBLISHABLE_KEY}
      # ── AI features (judges, quality scoring) ─────────────────────────────
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - AZTEA_ENABLE_LIVE_DISPUTE_JUDGES=${AZTEA_ENABLE_LIVE_DISPUTE_JUDGES:-0}
      - AZTEA_ENABLE_LIVE_QUALITY_JUDGE=${AZTEA_ENABLE_LIVE_QUALITY_JUDGE:-0}
      # ── Safety toggles ────────────────────────────────────────────────────
      - ALLOW_PRIVATE_OUTBOUND_URLS=0
      # ── Dispute auto-resolution ───────────────────────────────────────────
      - DISPUTE_JUDGE_INTERVAL_SECONDS=${DISPUTE_JUDGE_INTERVAL_SECONDS:-60}
      - DEFAULT_JOB_DISPUTE_WINDOW_HOURS=${DEFAULT_JOB_DISPUTE_WINDOW_HOURS:-72}
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  frontend:
    image: nginx:stable-alpine
    # TLS is not defined in bundled nginx.prod.conf (HTTP only). Terminate TLS at an outer
    # reverse proxy, or add ssl_certificate + listen 443 in nginx and map 443:443.
    ports:
      - "80:80"
    volumes:
      - ./frontend/dist:/usr/share/nginx/html:ro
      - ./nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/index.html || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  agentmarket_data:
    driver: local
