<svg xmlns="http://www.w3.org/2000/svg" viewBox="-32 -32 64 64" width="64" height="64">
  <style>
    .stroke { stroke: #063F43; fill: none; }
    .fill   { fill: #063F43; }
    .accent { fill: #C65F3F; }
    @media (prefers-color-scheme: dark) {
      .stroke { stroke: #7EB9B0; }
      .fill   { fill: #7EB9B0; }
      .accent { fill: #E07A57; }
    }
  </style>

  <!-- Outer ring + 12 diamond ticks (rotates clockwise) -->
  <g>
    <circle class="stroke" cx="0" cy="0" r="28" stroke-width="1.2" opacity="0.5" />
    <g>
      <g><rect class="fill" x="-1.8" y="-30.2" width="3.6" height="3.6" opacity="0.78" transform="rotate(45 0 -28.4)" /></g>
      <g transform="rotate(30)"><rect class="fill" x="-1.8" y="-30.2" width="3.6" height="3.6" opacity="0.78" transform="rotate(45 0 -28.4)" /></g>
      <g transform="rotate(60)"><rect class="fill" x="-1.8" y="-30.2" width="3.6" height="3.6" opacity="0.78" transform="rotate(45 0 -28.4)" /></g>
      <g transform="rotate(90)"><rect class="fill" x="-1.8" y="-30.2" width="3.6" height="3.6" opacity="0.78" transform="rotate(45 0 -28.4)" /></g>
      <g transform="rotate(120)"><rect class="fill" x="-1.8" y="-30.2" width="3.6" height="3.6" opacity="0.78" transform="rotate(45 0 -28.4)" /></g>
      <g transform="rotate(150)"><rect class="fill" x="-1.8" y="-30.2" width="3.6" height="3.6" opacity="0.78" transform="rotate(45 0 -28.4)" /></g>
      <g transform="rotate(180)"><rect class="fill" x="-1.8" y="-30.2" width="3.6" height="3.6" opacity="0.78" transform="rotate(45 0 -28.4)" /></g>
      <g transform="rotate(210)"><rect class="fill" x="-1.8" y="-30.2" width="3.6" height="3.6" opacity="0.78" transform="rotate(45 0 -28.4)" /></g>
      <g transform="rotate(240)"><rect class="fill" x="-1.8" y="-30.2" width="3.6" height="3.6" opacity="0.78" transform="rotate(45 0 -28.4)" /></g>
      <g transform="rotate(270)"><rect class="fill" x="-1.8" y="-30.2" width="3.6" height="3.6" opacity="0.78" transform="rotate(45 0 -28.4)" /></g>
      <g transform="rotate(300)"><rect class="fill" x="-1.8" y="-30.2" width="3.6" height="3.6" opacity="0.78" transform="rotate(45 0 -28.4)" /></g>
      <g transform="rotate(330)"><rect class="fill" x="-1.8" y="-30.2" width="3.6" height="3.6" opacity="0.78" transform="rotate(45 0 -28.4)" /></g>
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="50s" repeatCount="indefinite" />
    </g>
  </g>

  <!-- 8-petal lotus star (rotates counter-clockwise) -->
  <g>
    <path class="stroke" d="M 0 -22 Q 5 -12 0 -4 Q -5 -12 0 -22 Z" stroke-width="1.4" opacity="0.85" />
    <path class="stroke" d="M 0 -22 Q 5 -12 0 -4 Q -5 -12 0 -22 Z" stroke-width="1.4" opacity="0.85" transform="rotate(45)" />
    <path class="stroke" d="M 0 -22 Q 5 -12 0 -4 Q -5 -12 0 -22 Z" stroke-width="1.4" opacity="0.85" transform="rotate(90)" />
    <path class="stroke" d="M 0 -22 Q 5 -12 0 -4 Q -5 -12 0 -22 Z" stroke-width="1.4" opacity="0.85" transform="rotate(135)" />
    <path class="stroke" d="M 0 -22 Q 5 -12 0 -4 Q -5 -12 0 -22 Z" stroke-width="1.4" opacity="0.85" transform="rotate(180)" />
    <path class="stroke" d="M 0 -22 Q 5 -12 0 -4 Q -5 -12 0 -22 Z" stroke-width="1.4" opacity="0.85" transform="rotate(225)" />
    <path class="stroke" d="M 0 -22 Q 5 -12 0 -4 Q -5 -12 0 -22 Z" stroke-width="1.4" opacity="0.85" transform="rotate(270)" />
    <path class="stroke" d="M 0 -22 Q 5 -12 0 -4 Q -5 -12 0 -22 Z" stroke-width="1.4" opacity="0.85" transform="rotate(315)" />
    <animateTransform attributeName="transform" type="rotate" from="360" to="0" dur="36s" repeatCount="indefinite" />
  </g>

  <!-- Inner ring -->
  <circle class="stroke" cx="0" cy="0" r="8" stroke-width="1.1" opacity="0.6" />

  <!-- Central bindu — pulsing diamond -->
  <g>
    <rect class="accent" x="-3.5" y="-3.5" width="7" height="7" transform="rotate(45)" />
    <animateTransform attributeName="transform" type="scale" values="1;0.78;1" dur="4.5s" repeatCount="indefinite" />
  </g>
</svg>
